spring.application.name=checkpoint4

server.port=8080

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.filter=true

# spring.activemq.broker-url=tcp://localhost:61616
# spring.activemq.broker-url=tcp://localhost:61616?jms.redeliveryPolicy.maximumRedeliveries=0
spring.activemq.broker-url=tcp://localhost:61616?jms.redeliveryPolicy.maximumRedeliveries=3&jms.redeliveryPolicy.initialRedeliveryDelay=5000&jms.redeliveryPolicy.redeliveryDelay=5000
spring.activemq.user=admin
spring.activemq.password=admin

logging.level.org.springframework.jms=ERROR
logging.level.org.apache.activemq=ERROR
logging.level.org.springframework.jms.listener.DefaultMessageListenerContainer=ERROR
